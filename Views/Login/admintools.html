<!DOCTYPE html>
<html>
  <head>
    <title>Horus Admin Tools</title>
    <style>
      html,
      body {
        height: 100vh;
      }

      .styled-table {
        border-collapse: collapse;
        margin: 0;
        font-size: 0.9em;
        font-family: sans-serif;
        min-width: 400px;
        border: 1px solid var(--vintage-code);
      }

      .styled-table thead tr {
        background-color: var(--vintage-code);
        color: #ffffff;
        text-align: left;
      }

      .styled-table th,
      .styled-table td {
        padding: 12px 15px;
      }

      .styled-table tbody tr {
        border-bottom: 1px solid #dddddd;
      }

      .styled-table tbody tr:nth-of-type(even) {
        background-color: #f3f3f3;
      }

      .styled-table tbody tr:last-of-type {
        border-bottom: 2px solid var(--vintage-code);
      }

      .styled-table tbody tr.active-row {
        font-weight: bold;
        color: var(--vintage-code);
      }
    </style>
  </head>

  <body class="bg-transparent">
    <div class="" id="admin-root"></div>
    <script src="admin.js" type="module"></script>
  </body>
</html>
