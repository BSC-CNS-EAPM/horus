<!DOCTYPE html>
<html>
  <head>
    <title>Horus</title>

    <!-- Load the React app (necessary for parcel detecting the files) -->
    <script src="index.js" type="module" id="js-id"></script>

    <!-- OpenBabel -->
    <script
      src="/Static/obabel/openbabel.js"
      type="module"
      id="js-obabel"
    ></script>

    <!-- JSME -->
    <script
      src="/Static/JSME/jsme.nocache.js"
      type="module"
      id="js-jsme"
    ></script>
    <!-- Favicon -->

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../Favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../Favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../Favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../Favicon/site.webmanifest" />
    <link
      rel="mask-icon"
      href="../Favicon/safari-pinned-tab.svg"
      color="#2b5797"
    />
    <meta name="apple-mobile-web-app-title" content="Horus" />
    <meta name="application-name" content="Horus" />
    <meta name="msapplication-TileColor" content="#2b5797" />
    <meta name="theme-color" content="#2b5797" />

    <script>
      // Load the token from jinja2 variable
      const token = "{{ shemsu }}";
      if (token) {
        window.pywebview = window.pywebview || {};
        window.pywebview.token = token;
      }
      // Remove from the url the token
      window.history.replaceState({}, document.title, "/");
    </script>
  </head>

  <body>
    <!-- Initialize a React app -->
    <div id="horusRoot"></div>
  </body>
</html>
