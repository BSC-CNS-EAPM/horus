<!DOCTYPE html>
<html>
  <head>
    <title>Horus HTML Loader</title>
    <style>
      html {
        display: grid;
        place-items: center;
        height: 100%;
      }
    </style>
  </head>

  <div id="htmlContainer"></div>

  <body>
    <script>
      function noHTML(error) {
        document.getElementById("htmlContainer").innerHTML = `
                <div class="no-loaded-html">Error: ${error}</div>
            `;
      }
      function loadHTML(htmlToLoad) {
        document.querySelector("html").innerHTML = htmlToLoad;
        document.documentElement.innerHTML = htmlToLoad;
        document.getElementsByTagName("html")[0].innerHTML = htmlToLoad;
      }

      // Check if the extensionData object is available
      if (window.parent.extensionData) {
        const htmlToLoad = window.parent.extensionData.html;
        const type = window.parent.extensionData.type;

        if (type === "html_file") {
          parent.horus.getFile(htmlToLoad).then((blob) => {
            const reader = new FileReader();
            reader.onload = function (event) {
              const htmlContent = event.target.result;
              loadHTML(htmlContent);
            };
            reader.readAsText(blob);
          });
        } else {
          loadHTML(htmlToLoad);
        }
      } else {
        noHTML("extensionData is not available");
      }
    </script>
  </body>
</html>
