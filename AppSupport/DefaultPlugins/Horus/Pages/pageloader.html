<!doctype html>
<html>
  <head>
    <title>Horus HTML Loader</title>
    <style>
      html {
        display: grid;
        place-items: center;
        height: 100%;
      }
    </style>
  </head>

  <div id="htmlContainer"></div>

  <body>
    <script>
      function noHTML(error) {
        document.getElementById("htmlContainer").innerHTML = `
                <div class="no-loaded-html">Error: ${error}</div>
            `;
      }
      function loadHTML(htmlToLoad) {
        const blob = new Blob([htmlToLoad], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.location.href = url; // full reload
      }

      // Check if the extensionData object is available
      if (window.extensionData) {
        const htmlToLoad = window.extensionData.html;
        const type = window.extensionData.type;

        if (type === "html_file") {
          parent.horus.getFile(htmlToLoad).then((blob) => {
            const reader = new FileReader();
            reader.onload = function (event) {
              const htmlContent = event.target.result;
              loadHTML(htmlContent);
            };
            reader.readAsText(blob);
          });
        } else {
          loadHTML(htmlToLoad);
        }
      } else {
        noHTML("extensionData is not available");
      }
    </script>
  </body>
</html>
