<!doctype html>
<html>
  <head>
    <title>Horus PDF Loader</title>
    <style>
      html {
        display: grid;
        place-items: center;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="pdfContainer"></div>

    <script>
      function noImage(error) {
        document.getElementById("pdfContainer").innerHTML = `
                <div class="no-loaded-html">Error: ${error}</div>
            `;
      }

      // Check if the extensionData object is available
      if (window.extensionData) {
        const pdf = window.extensionData.pdf;

        const blob = parent.horus
          .getFile(pdf)
          .then((blob) => {
            pdfToLoad = URL.createObjectURL(blob);

            // Replace from the iframe-loader the <iframe> and add the PDF viewer
            const iframeDiv = parent.document.getElementById("iframe-loader");
            const newPDFElement = parent.document.createElement("div");
            newPDFElement.style.width = "100%";
            newPDFElement.style.height = "100%";
            newPDFElement.id = "pdfViewer";
            newPDFElement.innerHTML = `<object data="${pdfToLoad}" type="application/pdf" width="100%" height="100%"></object>`;
            iframeDiv.insertBefore(newPDFElement, iframeDiv.firstChild);
          })
          .catch((error) => {
            console.error(error);
            noImage(error);
          });
      } else {
        noImage("Extension data not available");
      }
    </script>
  </body>
</html>
