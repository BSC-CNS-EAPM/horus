<!doctype html>
<html>
  <head>
    <title>Horus Plot Loader</title>
    <script src="plotly.js"></script>
    <style>
      body {
        display: grid;
        place-items: center;
        height: 95vh;
        font-family: "Poppins", sans-serif;
      }

      #chart {
        width: 100%;
        height: calc(100vh - 5rem);
      }

      select {
        margin: 5px;
      }

      #selector {
        margin-top: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .flex-div {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
    </style>
  </head>

  <body>
    <div id="selector">
      <div class="flex-div">
        Color by:
        <select id="color" onchange="rebuildChart()">
          <option value="">None</option>
        </select>
      </div>

      <div class="flex-div">
        Plot type:
        <select id="type" onchange="rebuildChart()">
          <option value="scatter">Scatter</option>
          <option value="bar">Bar</option>
          <option value="line">Line</option>
        </select>
      </div>
      <div class="flex-div">
        <select id="yaxis" onchange="rebuildChart()"></select>
        vs.
        <select id="xaxis" onchange="rebuildChart()"></select>
      </div>
    </div>
    <div id="chart"></div>

    <script>
      let csvHeaders = [];
      let csvRowsData = [];

      function noChart(error) {
        document.body.innerHTML = `Error: ${error}`;
      }

      function isNumeric(value) {
        return !isNaN(value) && !isNaN(parseFloat(value));
      }

      function getUniqueColors(values) {
        // Generate unique colors for each unique value in the array
        const uniqueValues = [...new Set(values)];
        const colors = {};
        uniqueValues.forEach((value) => {
          colors[value] = randomColor();
        });
        return colors;
      }

      function randomColor() {
        const letters = "0123456789ABCDEF";
        let color = "#";
        for (let i = 0; i < 6; i++) {
          color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
      }

      function buildChart(xaxis, yaxis, color, type) {
        // Prepare chart data
        const xData = csvRowsData.map((row) => row[xaxis]);
        const yData = csvRowsData.map((row) => row[yaxis]);
        let markerColor = [];

        if (color) {
          // Get the unique colors for the selected color metric
          const colorValues = csvRowsData.map((row) => row[color]);
          const colorMap = getUniqueColors(colorValues);

          // Map each point to the corresponding color based on the color metric
          markerColor = colorValues.map((value) => colorMap[value]);
        } else {
          markerColor = Array(xData.length).fill("rgba(75, 192, 192, 0.7)");
        }

        const trace = {
          x: xData,
          y: yData,
          mode:
            type === "line" ? "lines" : type === "scatter" ? "markers" : "none",
          type: type,
          marker: { color: markerColor },
          line: { color: "rgba(75, 192, 192, 1)" },
        };

        const layout = {
          title: `${yaxis} vs ${xaxis}`,
          xaxis: { title: xaxis },
          yaxis: { title: yaxis, autorange: true },
          responsive: true,
        };

        Plotly.newPlot("chart", [trace], layout, { responsive: true });
      }

      function rebuildChart() {
        const xaxis = document.getElementById("xaxis").value;
        const yaxis = document.getElementById("yaxis").value;
        const color = document.getElementById("color").value;
        const type = document.getElementById("type").value;
        buildChart(xaxis, yaxis, color, type);
      }

      // Load CSV data and initialize chart options
      if (window.extensionData?.plot) {
        const plot = window.extensionData.plot;

        if (plot.endsWith(".csv")) {
          parent.horus
            .getFile(plot)
            .then((blob) => {
              const reader = new FileReader();
              reader.readAsText(blob);
              reader.onload = () => {
                const csvData = reader.result;
                buildPlotFromCSV(csvData);
              };
            })
            .catch((error) => {
              noChart(error);
            });
        } else {
          buildPlotFromCSV(plot);
        }
      } else {
        noChart("Extension data not available");
      }

      function buildPlotFromCSV(csvData) {
        const csvRows = csvData.split("\n");
        csvHeaders = csvRows[0]
          .split(",")
          .map((header) => header.replace(/"/g, "").trim());

        csvRowsData = csvRows.slice(1).map((row) => {
          const values = row.split(",");
          let parsedRow = {};
          for (let i = 0; i < values.length; i++) {
            parsedRow[csvHeaders[i]] = isNumeric(values[i])
              ? parseFloat(values[i])
              : values[i].trim();
          }
          return parsedRow;
        });

        // Populate dropdowns
        const xaxis = document.getElementById("xaxis");
        const yaxis = document.getElementById("yaxis");
        const color = document.getElementById("color");
        csvHeaders.forEach((header) => {
          const xOption = document.createElement("option");
          const yOption = document.createElement("option");
          const colorOption = document.createElement("option");
          xOption.value = yOption.value = colorOption.value = header;
          xOption.text = yOption.text = colorOption.text = header;
          xaxis.appendChild(xOption);
          yaxis.appendChild(yOption);
          color.appendChild(colorOption);
        });

        xaxis.value = csvHeaders[0];
        yaxis.value = csvHeaders[1];

        // Build initial chart
        buildChart(xaxis.value, yaxis.value, "", "scatter");
      }
    </script>
  </body>
</html>
