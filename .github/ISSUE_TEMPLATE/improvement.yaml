name: 🟢 Improvement
description: File an improvement issue
title: "🟢 [IMPROVEMENT] <title>"
labels: [improvement]
body:
  - type: textarea
    attributes:
      label: Current behaviour
      description: A concise description of how the feature currently works.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Improved behaviour
      description: A concise description of how you would like the feature to work.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Supporting information
      description: |
        Screenshots, videos, links to the documentation...

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
