name: 🟡 Documentation
description: File a documentation issue / improvement
title: "🟡 [DOCUMENTATION] <title>"
labels: [documentation]
body:
  - type: textarea
    attributes:
      label: Issue to be addressed
      description: A concise description of what to add to the documentation.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Supporting information
      description: |
        Screenshots, links to the documentation...

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
