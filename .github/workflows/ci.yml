name: Horus CI/CD Pipeline

on:
  push:
    tags:
      - "*"
  pull_request:
    branches:
      - "*"

env:
  MICROMAMBA_BINARY_PATH: "/home/perry/data/bin/micromamba"
  DOCS_BUILD_DIR: "/home/perry/data/cdominguez/horus-docs/"

jobs:
  test-and-lint:
    runs-on: perry
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          source <($MICROMAMBA_BINARY_PATH shell hook --shell bash)
          $MICROMAMBA_BINARY_PATH create -f Devtools/Environment/conda_horus.yaml -n horus_test_ci -y
          micromamba activate horus_test_ci
          npm i

      - name: Build and test
        run: |
          source <($MICROMAMBA_BINARY_PATH shell hook --shell bash)
          micromamba activate horus_test_ci
          npm run buildparcel
          npm run test
          source Devtools/lint.sh

  build_horus:
    runs-on: perry
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment variables
        run: |
          echo "GIT_TAG=$(basename $GITHUB_REF)" >> $GITHUB_ENV
          echo "GIT_COMMIT=${GITHUB_SHA:0:8}" >> $GITHUB_ENV
          echo "GIT_BRANCH=$(basename $GITHUB_REF)" >> $GITHUB_ENV
          echo "VERSION=$(basename $GITHUB_REF)" >> $GITHUB_ENV

      - name: Display environment variables
        run: |
          echo "GIT_TAG=$GIT_TAG"
          echo "GIT_COMMIT=$GIT_COMMIT"
          echo "GIT_BRANCH=$GIT_BRANCH"
          echo "VERSION=$VERSION"

      - name: Build Docker and Singularity
        run: |
          export GIT_TAG=${{ env.GIT_TAG }}
          export GIT_COMMIT=${{ env.GIT_COMMIT }}
          export GIT_BRANCH=${{ env.GIT_BRANCH }}
          export VERSION=${{ env.VERSION }}
          source Devtools/Docker/build_standalone_horus_docker.sh
          bash Devtools/Singularity/build_multiplatform.sh

      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release
          gh release create ${{ env.VERSION }} \
            --title "Horus ${{ env.VERSION }}" \
            --notes "Release ${{ env.VERSION }}" \
            dist/*.tar.gz

  publish_horusapi:
    runs-on: [self-hosted, perry]
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup environment variables
        run: |
          echo "GIT_TAG=$(basename $GITHUB_REF)" >> $GITHUB_ENV
          echo "GIT_COMMIT=${GITHUB_SHA:0:8}" >> $GITHUB_ENV
          echo "GIT_BRANCH=$(basename $GITHUB_REF)" >> $GITHUB_ENV
          echo "VERSION=$(basename $GITHUB_REF)" >> $GITHUB_ENV

      - name: Display environment variables
        run: |
          echo "GIT_TAG=$GIT_TAG"
          echo "GIT_COMMIT=$GIT_COMMIT"
          echo "GIT_BRANCH=$GIT_BRANCH"
          echo "VERSION=$VERSION"

      - name: Build and publish with Docker
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          export GIT_TAG=${{ env.GIT_TAG }}
          export GIT_COMMIT=${{ env.GIT_COMMIT }}
          export GIT_BRANCH=${{ env.GIT_BRANCH }}
          export VERSION=${{ env.VERSION }}
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e GIT_TAG=$GIT_TAG \
            -e GIT_COMMIT=$GIT_COMMIT \
            -e GIT_BRANCH=$GIT_BRANCH \
            -e VERSION=$VERSION \
            -e TWINE_USERNAME=$TWINE_USERNAME \
            -e TWINE_PASSWORD=$TWINE_PASSWORD \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              yum install -y zip unzip &&
              export PATH=/opt/python/cp39-cp39/bin:\$PATH &&
              pip install cython==3.0.2 twine==6.1.0 mypy==1.8 pydantic==2.11.7 pathvalidate==3.2.0 setuptools==80.8.0 wheel==0.45.1 &&
              bash Devtools/Compile/build_horusapi.sh &&
              auditwheel repair dist/*.whl &&
              twine upload wheelhouse/*.whl
            "

      - name: Fix workspace permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .

  build_docs:
    runs-on: perry
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout branch/tag
        run: |
          echo "Checking out the code..."
          git fetch --all
          git checkout ${GITHUB_REF#refs/*/}

      - name: Setup Micromamba environment
        run: |
          echo "Setting up Micromamba environment..."
          $MICROMAMBA_BINARY_PATH remove --name horus_docs --yes || true
          $MICROMAMBA_BINARY_PATH create --name horus_docs --file Devtools/Environment/conda_horus.yaml --yes

      - name: Build documentation
        run: |
          source <($MICROMAMBA_BINARY_PATH shell hook --shell bash)
          micromamba activate horus_docs
          echo "Building the documentation..."
          bash Devtools/build_docs.sh

      - name: Publish documentation
        run: |
          echo "Pushing the documentation..."
          mkdir -p $DOCS_BUILD_DIR
          cp -r HorusAPI/docs/build/html/* $DOCS_BUILD_DIR
