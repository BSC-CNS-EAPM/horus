name: Horus CI/CD Pipeline

on:
  push:
    tags:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  test-and-lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GTK4 system libs
        run: sudo apt-get install -y libgirepository1.0-dev gcc libgtk-4-dev

      - name: Setup Micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: Devtools/Environment/conda_horus.yaml
          environment-name: horus_test_ci
          init-shell: bash

      - name: Install frontend dependencies
        run: npm i

      - name: Build frontend
        run: npm run buildparcel
        shell: micromamba-shell {0}

      - name: Run tests
        run: npm run test
        shell: micromamba-shell {0}

      - name: Run linters
        run: source Devtools/lint.sh
        shell: micromamba-shell {0}

  build-ubuntu22:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/APP_VERSION = .*/APP_VERSION = $VERSION/" App/APP_INFO

      - name: Install GTK4 system libs
        run: sudo apt-get install -y libgirepository1.0-dev gcc libgtk-4-dev

      - name: Setup Micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: Devtools/Environment/conda_horus.yaml
          environment-name: horus_ubuntu22
          init-shell: bash

      - name: Install Ubuntu-specific packages
        run: pip install pygobject==3.46.0 pycairo==1.25.1
        shell: micromamba-shell {0}

      - name: Install frontend dependencies
        run: npm i --legacy-peer-deps

      - name: Build
        run: npm run build
        shell: micromamba-shell {0}

      - name: Package
        run: npm run distribute
        shell: micromamba-shell {0}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu22
          path: dist/*.tar.gz

  build-rocky8:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/APP_VERSION = .*/APP_VERSION = $VERSION/" App/APP_INFO

      - name: Install frontend dependencies
        run: npm i --legacy-peer-deps

      - name: Build frontend on host
        run: npm run buildparcel
        # ponytail: parcel's Rust bindings need glibc >= 2.29; Rocky 8 only has 2.28

      - name: Build Horus and package in Rocky Linux 8 container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e QT_QPA_PLATFORM=offscreen \
            rockylinux:8 bash -c "
              set -e
              dnf install -y curl git bzip2 gcc gcc-c++ make libxcb libxkbcommon-x11
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - && dnf install -y nodejs
              curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C /usr/local/bin --strip-components=1 bin/micromamba
              micromamba env create -f Devtools/Environment/conda_horus.yaml -n horus_rocky8 -y
              micromamba run -n horus_rocky8 pip install 'pywebview==5.4' 'PyQt5' 'PyQtWebEngine' 'QtPy'
              micromamba run -n horus_rocky8 npm run compile
              npm run distribute
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocky8
          path: dist/*.tar.gz

  build-macos-arm:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i '' "s/APP_VERSION = .*/APP_VERSION = $VERSION/" App/APP_INFO

      - name: Setup Micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: Devtools/Environment/conda_horus.yaml
          environment-name: horus_macos_arm
          init-shell: bash

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: npm i --legacy-peer-deps

      - name: Build
        run: npm run build
        shell: micromamba-shell {0}

      - name: Package
        run: npm run distribute
        shell: micromamba-shell {0}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: dist/*.zip

  publish-horusapi:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and publish wheel
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e VERSION=$VERSION \
            -e GIT_TAG=$VERSION \
            -e GIT_BRANCH=$VERSION \
            -e GIT_COMMIT=${GITHUB_SHA::8} \
            -e TWINE_USERNAME=$TWINE_USERNAME \
            -e TWINE_PASSWORD=$TWINE_PASSWORD \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              yum install -y zip unzip &&
              export PATH=/opt/python/cp312-cp312/bin:\$PATH &&
              pip install cython==3.0.2 twine==6.1.0 mypy==1.8 pydantic==2.11.7 pathvalidate==3.2.0 setuptools==80.8.0 wheel==0.45.1 &&
              bash Devtools/Compile/build_horusapi.sh &&
              auditwheel repair dist/*.whl &&
              twine upload --skip-existing wheelhouse/*.whl
            "

      - name: Fix workspace permissions
        if: always()
        run: docker run --rm -v $(pwd):/workspace alpine chown -R $(id -u):$(id -g) /workspace

  release:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-ubuntu22, build-rocky8, build-macos-arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "$VERSION" \
            --title "Horus $VERSION" \
            --notes "Release $VERSION" \
            dist-artifacts/**/*

  build_docs:
    runs-on: perry
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-lint
    env:
      MICROMAMBA_BINARY_PATH: "/home/perry/data/bin/micromamba"
      DOCS_BUILD_DIR: "/home/perry/data/cdominguez/horus-docs/"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout branch/tag
        run: |
          echo "Checking out the code..."
          git fetch --all
          git checkout ${GITHUB_REF#refs/*/}

      - name: Setup Micromamba environment
        run: |
          echo "Setting up Micromamba environment..."
          $MICROMAMBA_BINARY_PATH remove --name horus_docs --yes || true
          $MICROMAMBA_BINARY_PATH create --name horus_docs --file Devtools/Environment/conda_horus.yaml --yes

      - name: Build documentation
        run: |
          source <($MICROMAMBA_BINARY_PATH shell hook --shell bash)
          micromamba activate horus_docs
          echo "Building the documentation..."
          bash Devtools/build_docs.sh

      - name: Publish documentation
        run: |
          echo "Pushing the documentation..."
          mkdir -p $DOCS_BUILD_DIR
          cp -r HorusAPI/docs/build/html/* $DOCS_BUILD_DIR
