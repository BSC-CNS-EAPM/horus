name: Test and build Horus

on:
  pull_request:
    branches: [main, development]

jobs:
  test-comment:
    runs-on: [self-hosted]
    steps:
      - uses: actions/github-script@v4
        env:
          RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run_id = context.runId;

            github.issues.createComment({
              issue_number: issue_number,
              owner: owner,
              repo: repo,
              body: `The tests and linting are running. Please wait for the results.`
            })
  test-and-lint:
    needs: test-comment
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v3
      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: Devtools/Environment/conda_horus.yaml
          cache-environment: true
          download-micromamba: false
          micromamba-binary-path: /home/nbdweb/micromamba-bin/micromamba
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v2
        with:
          node-version: "18"
      - name: Install bun dependencies
        run: |
          bun i
      - name: Install parcel binaries
        run: |
          npm install --save-dev --save-exact --legacy-peer-deps parcel@2.11.0
      - name: Build GUI
        run: |
          bun run buildparcel
      - name: Testing Horus
        run: |
          bun run test
      - name: Linting Horus
        run: |
          sh Devtools/lint.sh
      - uses: stefanzweifel/git-auto-commit-action@v5
        id: auto-commit-action
        with:
          commit_message: "Run pylint, TS and eslint. Applied prettier and black"
          branch: ${{ github.head_ref }}
  build:
    needs: test-and-lint
    permissions:
      contents: write
      pull-requests: write
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: FranzDiebold/github-env-vars-action@v2
      - name: Gather CI environment
        run: |
          export GIT_TAG=$(git describe --tags --abbrev=0)
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
          echo "Latest tag: $GIT_TAG"
          export GIT_BRANCH=$CI_HEAD_REF
          echo "GIT_BRANCH=$GIT_BRANCH" >> $GITHUB_ENV
          echo "Branch: $GIT_BRANCH"
          export GIT_COMMIT=$CI_SHA_SHORT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_ENV
          echo "Commit: $GIT_COMMIT"
          # Set the version as tag-branch-commit from the env
          export VERSION=$GIT_TAG-$GIT_BRANCH-$GIT_COMMIT
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "Built version: $VERSION"
      - name: Build Horus - Rocky 8
        run: singularity run --bind .:/app docker://chdominguez/horus_rocky
