name: Test and build Horus

on:
  pull_request:
    branches: [main]

env:
  CACHE_NUMBER: 0 # increase to reset cache manually

jobs:
  build-ubuntu:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-20.04
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v3
      - name: Install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - uses: actions/cache@v3.3.1
        with:
          path: node_modules
          key: linux-64-node-${{ hashFiles('package.json') }}-${{ env.CACHE_NUMBER }}
        id: cache-node-linux
      - name: Install dependencies
        run: |
          npm run requirements-action
        if: steps.cache-node-linux.outputs.cache-hit != 'true'
      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v2.2.0
        with:
          miniforge-version: latest
          miniforge-variant: mambaforge
          use-mamba: true
          python-version: 3.9.16
          add-pip-as-python-dependency: true
          auto-activate-base: false
          activate-environment: horus
      - uses: actions/cache@v3.3.1
        with:
          path: /usr/share/miniconda3/envs/horus
          key: /usr/share/miniconda3/envs/horus-conda-${{ hashFiles('Devtools/Environment/conda_horus.yaml') }}-${{ env.CACHE_NUMBER }}
        id: cache-conda-linux
      - name: Update environment
        run: mamba env update -n horus -f Devtools/Environment/conda_horus.yaml
        if: steps.cache-conda-linux.outputs.cache-hit != 'true'
      - name: Build GUI
        run: npm run buildparcel
      - name: Test
        run: |
          npm run test
      - name: Build
        run: |
          npm run build
      - name: Package
        run: |
          npm run distribute
          cd dist/Packages
          export FILENAME=$(ls *.deb)
          echo "filename=$FILENAME" >> $GITHUB_ENV
          echo "Produced artifact: $FILENAME"
      - name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v3.1.2
        with:
          name: ${{ env.filename }}
          path: dist/Packages/*.deb
          if-no-files-found: error

  build-macos:
    permissions:
      contents: write
      pull-requests: write
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v3
      - name: Install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - uses: actions/cache@v3.3.1
        with:
          path: node_modules
          key: osx-64-node-${{ hashFiles('package.json') }}-${{ env.CACHE_NUMBER }}
        id: cache-node-macos
      - name: Install dependencies
        run: |
          npm run requirements-action
        if: steps.cache-node-macos.outputs.cache-hit != 'true'
      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v2.2.0
        with:
          miniforge-version: latest
          miniforge-variant: mambaforge
          use-mamba: true
          python-version: 3.9.16
          add-pip-as-python-dependency: true
          auto-activate-base: false
          activate-environment: horus
      - uses: actions/cache@v3.3.1
        with:
          path: /Users/runner/miniconda3/envs/horus
          key: osx-64-conda-${{ hashFiles('Devtools/Environment/conda_horus.yaml') }}-${{ env.CACHE_NUMBER }}
        id: cache-conda-macos
      - name: Update environment
        run: mamba env update -n horus -f Devtools/Environment/conda_horus.yaml
        if: steps.cache-conda-macos.outputs.cache-hit != 'true'
      - name: Build GUI
        run: npm run buildparcel
      - name: Test
        run: |
          npm run test
      - name: Build
        run: |
          npm run build
      - name: Package
        run: |
          npm run distribute
          cd dist/Packages
          export FILENAME=$(ls *.dmg)
          echo "filename=$FILENAME" >> $GITHUB_ENV
          echo "Produced artifact: $FILENAME"
      - name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v3.1.2
        with:
          name: ${{ env.filename }}
          path: dist/Packages/*.dmg
          if-no-files-found: error
