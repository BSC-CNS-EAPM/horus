Bootstrap: docker
From: ubuntu:14.04

%environment
    # Setup conda variables
    export PATH="/opt/conda/bin:${PATH}"

%files
    package.json /package.json
    Devtools/Environment/conda_horus.yaml /Devtools/Environment/conda_horus.yaml

%post

    # Set some non-interactive environment variables
    export DEBIAN_FRONTEND=noninteractive
    export TZ=Etc/UTC

    # Update cache and install dependencies
    apt-get update --no-install-recommends -y

    # Install basic dependencies
    apt-get install -y \
    curl \
    zip \
    git \
    gcc \
    g++

    # GTK4 (updated ubuntu requires GTK4 instead of GTK3)
    # apt install -y \
    # libgirepository1.0-dev \
    # gir1.2-gtk-4.0 \
    # gir1.2-webkit2-4.0 \
    # libgtk-4-dev \
    # libglib2.0-dev

    # Install miniconda
    curl -LO https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
    bash Miniconda3-latest-Linux-x86_64.sh -b -p /opt/conda
    rm Miniconda3-latest-Linux-x86_64.sh
    echo "source /opt/conda/etc/profile.d/conda.sh" >> ~/.bashrc
    echo "conda activate base" >> ~/.bashrc

    # Activate conda environment and install requirements
    . /opt/conda/etc/profile.d/conda.sh
    conda activate base

    # Install nodejs 18
    # curl -sL https://deb.nodesource.com/setup_18.x -o /tmp/nodesource_setup.sh
    # bash /tmp/nodesource_setup.sh
    # apt-get install -y nodejs

    # Node 18 cannot be installed on Ubuntu 14.04
    # We rely on the built GUI folder from previous builds
    
    # Install requirements
    # npm run requirements

%runscript
    # Source conda
    . /opt/conda/etc/profile.d/conda.sh

    conda env create -f Devtools/Environment/conda_horus.yaml -n horus

    # Activate conda environment
    conda activate horus

    # Build horus
    sh Devtools/Compile/build_horus.sh
    
    # Create the packages
    sh Devtools/Package/linux.sh
