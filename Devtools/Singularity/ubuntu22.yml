Bootstrap: docker
From: ubuntu:22.04

%environment
    # Setup conda variables
    export PATH="/opt/conda/bin:${PATH}"

%files
    package.json /package.json
    Devtools/Environment/conda_horus.yaml /Devtools/Environment/conda_horus.yaml

%post

    # Set some non-interactive environment variables
    export DEBIAN_FRONTEND=noninteractive
    export TZ=Etc/UTC

    # Update cache and install dependencies
    apt-get update --no-install-recommends -y

    # Install basic dependencies
    apt-get install -y \
    curl \
    zip \
    git \
    gcc \
    g++

    # GTK4 (updated ubuntu requires GTK4 instead of GTK3)
    apt install -y \
    libgirepository1.0-dev \
    gir1.2-gtk-4.0 \
    gir1.2-webkit2-4.0 \
    libgtk-4-dev \
    libglib2.0-dev

    # Install miniconda
    curl -LO https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
    bash Miniconda3-latest-Linux-x86_64.sh -b -p /opt/conda
    rm Miniconda3-latest-Linux-x86_64.sh
    echo "source /opt/conda/etc/profile.d/conda.sh" >> ~/.bashrc
    echo "conda activate base" >> ~/.bashrc

    # Activate conda environment and install requirements
    . /opt/conda/etc/profile.d/conda.sh
    conda activate base

    # Install nodejs 18
    # curl -sL https://deb.nodesource.com/setup_18.x -o /tmp/nodesource_setup.sh
    # bash /tmp/nodesource_setup.sh
    # apt-get install -y nodejs

    apt-get install -y ca-certificates curl gnupg
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
    NODE_MAJOR=18
    echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_$NODE_MAJOR.x nodistro main" | tee /etc/apt/sources.list.d/nodesource.list
    apt-get update
    apt-get install nodejs -y


%runscript
    # Source conda
    . /opt/conda/etc/profile.d/conda.sh

    # Set the bun path ~/.bun/bin/bun
    export PATH=~/.bun/bin:${PATH}

    # Install requirements
    npm run requirements

    # Fix parcel with yarn
    npm install --legacy-peer-deps yarn
    npx yarn

    # Update conda environment with Ubuntu-specific packages
    conda activate horus
    python -m pip install pygobject pycairo

    # Activate conda environment
    conda activate horus

    # Build horus
    npm run build

    # Create the packages
    npm run distribute
