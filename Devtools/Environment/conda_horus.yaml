name: horus
channels:
  - conda-forge
  - nostrumbiodiscovery
dependencies:
  - pip=23.1.2
  - python=3.9.16
  - pyinstaller==5.10.1
  - flask==2.3.2
  - requests==2.29.0
  - rdkit
  - openmm
  - scipy
  - tk
  - pip:
      - pywebview==4.1
      - flask-cors==3.0.10
      - pyobjc==9.1.1; sys_platform == 'darwin'
      - qtpy; sys_platform == 'linux'
      - PyQt5; sys_platform == 'linux'
      - PyQtWebEngine; sys_platform == 'linux'
      - flask-socketio
      - eventlet
      - gevent
      - Cython==3.0.0b3
      - paramiko
      - pytest
# Pyobjc because on macOS we use native WebKit view
# Qtpy because on Linux we use Qt WebEngine due to GTK issues on RHEL
